name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.17"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

      - name: Work safety guard
        run: ./scripts/check-work-safe.sh

      - name: Compose build
        run: docker compose -p hermes-work --profile work -f docker-compose.yml -f docker-compose.work.yml build
