services:
  mock-model:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim-bookworm@sha256:e2d3af735aff6eeee600b1933bedd99da6645fedf572cc12ef4cc1331f2ceebe
        WORKDIR /app
        COPY services/mock_model/requirements.txt /tmp/mock-model-requirements.txt
        RUN pip install --no-cache-dir -r /tmp/mock-model-requirements.txt
        COPY services /app/services
        RUN useradd --create-home --uid 10002 mockmodel \
            && chown -R mockmodel:mockmodel /app
        USER mockmodel
        CMD ["uvicorn", "services.mock_model.app:app", "--host", "0.0.0.0", "--port", "8080"]
    profiles: ["personal", "work", "test"]
    ports:
      - "127.0.0.1:18080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
